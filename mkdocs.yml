site_name: reflect
site_description: Repo-owned memory for AI coding agents
site_url: https://codeyogi911.github.io/reflect/
repo_url: https://github.com/codeyogi911/reflect
repo_name: codeyogi911/reflect
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

hooks:
  - docs/hooks/cli_reference.py

exclude_docs: |
  badges/

nav:
  - Home: index.md
  - Install: install.md
  - Commands: commands.md
  - Configuration: configuration.md
  - Skill & Hooks: skill.md
  - Specification: spec.md
  - Roadmap: roadmap.md
